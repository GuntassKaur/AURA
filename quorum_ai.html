<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUORUM AI | Neural Stadium OS</title>
    <style>
        :root {
            --bg-base: #060810;
            --accent: #00ffc8;
            --accent-dim: #00ffc840;
            --accent-glow: rgba(0, 255, 200, 0.15);
            --border: #00ffc815;
            --text: #ffffff;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg-base);
            color: var(--text);
            font-family: var(--font-mono);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- LAYOUT --- */
        #stadium-viewport {
            flex: 1;
            height: 100%;
            position: relative;
            background: radial-gradient(ellipse 90% 70% at 50% 45%, #0d1f0d 0%, #060f06 50%, #030703 100%);
            overflow: hidden;
        }

        #stadium-bg-animator {
            position: absolute;
            inset: 0;
            background: inherit;
            animation: stadiumZoom 18s ease-in-out infinite alternate;
        }

        @keyframes stadiumZoom {
            from { transform: scale(1.0); }
            to { transform: scale(1.06); }
        }

        #right-panel {
            width: 350px;
            height: 100%;
            background: #00000080;
            border-left: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        @media (max-width: 1024px) {
            body { flex-direction: column; overflow-y: auto; }
            #stadium-viewport { height: 60vh; flex: none; width: 100%; }
            #right-panel { width: 100%; height: auto; border-left: none; border-top: 1px solid var(--border); }
            #top-bar { position: sticky; top: 0; }
            .mode-group { position: static; transform: none; margin: 10px 0; overflow-x: auto; padding-bottom: 5px; }
        }

        /* --- COMPONENTS --- */
        #stadium-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: #00000070;
            border-bottom: 1px solid #00ffc812;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }

        .top-left-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 5px var(--accent); }
            50% { transform: scale(1.2); opacity: 0.7; box-shadow: 0 0 15px var(--accent); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 5px var(--accent); }
        }

        .mode-group {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .mode-btn {
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 11px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #00ffc880;
            border: 1px solid #00ffc830;
            outline: none;
            text-transform: uppercase;
        }

        .mode-btn.active {
            background: var(--accent);
            color: #000;
            border: none;
            box-shadow: 0 0 15px var(--accent-dim);
        }

        /* --- STADIUM OVERLAYS --- */
        #quorum-brand {
            position: absolute;
            top: 64px;
            left: 20px;
            z-index: 10;
        }

        .brand-logo {
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 0.15em;
            font-weight: bold;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--accent-dim);
            margin-top: 4px;
        }

        #bottom-status {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 28px;
            background: #00000060;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
        }

        .bottom-right {
            color: var(--accent);
            font-size: 10px;
        }

        /* --- HEATMAP STYLES --- */
        .heatmap-zone {
            position: absolute;
            border-radius: 50%;
            filter: blur(28px);
            mix-blend-mode: screen;
            pointer-events: none;
            animation: breathe 3s ease-in-out infinite alternate;
            z-index: 3;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes breathe {
            from { transform: translate(-50%, -50%) scale(1.0); }
            to { transform: translate(-50%, -50%) scale(1.12); }
        }

        .zone-float-label {
            position: absolute;
            font-size: 10px;
            color: var(--accent);
            background: rgba(0, 0, 0, 0.75);
            padding: 3px 8px;
            border-radius: 3px;
            border: 1px solid rgba(0, 255, 200, 0.2);
            white-space: nowrap;
            pointer-events: none;
            z-index: 6;
            transform: translate(-50%, -120%);
            animation: fadeFloat 4s ease-in-out infinite alternate;
        }

        @keyframes fadeFloat {
            from { opacity: 0.4; transform: translate(-50%, -124%); }
            to { opacity: 1.0; transform: translate(-50%, -120%); }
        }

        /* --- RIGHT PANEL CONTENT --- */
        .panel-header {
            padding: 14px 16px;
        }

        .os-label {
            font-size: 10px;
            color: #00ffc860;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .shell-title {
            font-size: 18px;
            color: var(--accent);
            font-weight: bold;
            margin-top: 8px;
            letter-spacing: 0.05em;
        }

        .panel-section-label {
            font-size: 10px;
            color: var(--accent-dim);
            margin: 20px 16px 8px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        /* --- VITALS HUD --- */
        .vitals-container {
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--border);
        }

        .vitals-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px;
            border-bottom: 1px solid rgba(0, 255, 200, 0.1);
            transition: background 0.3s;
        }

        .vitals-left { display: flex; align-items: baseline; gap: 8px; }
        .vitals-id { font-size: 11px; font-weight: bold; color: var(--accent); }
        .vitals-name { font-size: 10px; color: rgba(255, 255, 255, 0.4); }

        .vitals-right { display: flex; gap: 12px; }
        .vitals-stat { font-size: 10px; }

        /* --- MESH & SYSTEM SECTIONS --- */
        .system-section {
            padding: 16px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
        }

        .system-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .system-val { color: var(--accent); }
        .mesh-active { color: #00ff88; font-weight: bold; }

        #zone-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 0 16px 0;
        }

        .zone-card {
            background: rgba(0, 255, 200, 0.03);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            margin: 0 16px 12px;
            transition: border-color 0.3s;
        }

        .zone-card.CRITICAL { border-color: #ff3a3a; background: rgba(255, 58, 58, 0.05); }
        .zone-card.HIGH { border-color: #ffaa00; }
        .zone-card.MEDIUM { border-color: #00ffc840; }

        .zone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .zone-name { font-size: 11px; font-weight: bold; color: var(--accent); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-item { font-size: 10px; }
        .stat-label { color: rgba(255,255,255,0.3); margin-right: 4px; }
        .stat-value { color: #fff; }

        .risk-badge {
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 2px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .risk-LOW { background: rgba(0, 255, 200, 0.2); color: var(--accent); }
        .risk-MEDIUM { background: rgba(255, 200, 0, 0.2); color: #ffaa00; }
        .risk-HIGH { background: rgba(255, 100, 0, 0.2); color: #ff6600; }
        .risk-CRITICAL { background: rgba(255, 0, 0, 0.3); color: #ff3a3a; animation: alertPulse 1s infinite; }

        @keyframes alertPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="stadium-viewport">
        <div id="stadium-bg-animator"></div>
        <svg id="stadium-svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice"></svg>
        
        <div id="quorum-brand">
            <div class="brand-logo">QUORUM AI</div>
            <div class="brand-sub">LIVE_NEURAL_TELEMETRY_LINKED</div>
        </div>

        <div id="heatmap-container"></div>
        <div id="labels-container"></div>

        <div id="bottom-status">
            <div class="bottom-left">
                NEURAL_LOAD: <span id="meta-load" style="color:var(--accent)">12%</span> | 
                DATA_INTEGRITY: <span style="color:var(--accent)">100%</span> | 
                ENCRYPTION: <span style="color:var(--accent)">LATTICE_V6</span>
            </div>
            <div class="bottom-right">REAL-TIME CROWD ANALYTICS ACTIVE</div>
        </div>
    </div>

    <aside id="right-panel">
        <header id="top-bar">
            <div class="top-left-status">
                <div class="pulse-dot"></div>
                <span style="font-size:10px; letter-spacing:0.1em;">GLOBAL</span>
            </div>
            <div class="mode-group">
                <button class="mode-btn active" onclick="setMode('FOOTBALL')">FOOTBALL</button>
                <button class="mode-btn" onclick="setMode('CRICKET')">CRICKET</button>
                <button class="mode-btn" onclick="setMode('CONCERT')">CONCERT</button>
                <button class="mode-btn" onclick="setMode('TENNIS')">TENNIS</button>
            </div>
        </header>

        <div class="panel-header" style="margin-top: 52px;">
            <div class="os-label">QUORUM OS V7</div>
            <div class="shell-title">NEURAL_SHELL</div>
        </div>

        <div class="panel-section-label">VITALS HUD</div>
        <div id="vitals-hud" class="vitals-container"></div>

        <div class="panel-section-label">ZONE ANALYTICS</div>
        <div id="zone-list"></div>

        <div class="panel-section-label">MESH NETWORK</div>
        <div class="system-section" id="mesh-meta"></div>

        <div class="panel-section-label">SYSTEM STATUS</div>
        <div class="system-section" id="system-status"></div>
    </aside>

    <script>
        // --- DATA ENGINE ---
        const SENSOR_DATA = {
            zones: [
                { id:"A1", name:"North Stand",  x:50, y:22, crowd:91, o2:20.1, temp:33.2, risk:"HIGH"   },
                { id:"B2", name:"East Block",   x:72, y:40, crowd:65, o2:20.6, temp:32.1, risk:"MEDIUM" },
                { id:"C3", name:"West Block",   x:28, y:40, crowd:58, o2:20.8, temp:31.8, risk:"LOW"    },
                { id:"D4", name:"South Stand",  x:50, y:68, crowd:96, o2:18.9, temp:36.4, risk:"CRITICAL"},
                { id:"E5", name:"Gate Plaza",   x:50, y:85, crowd:44, o2:21.0, temp:30.5, risk:"LOW"    },
                { id:"F6", name:"VIP Section",  x:50, y:48, crowd:72, o2:20.3, temp:33.8, risk:"MEDIUM" }
            ],
            mesh: { active: true, nodes: 82000, coverage: 99.8 },
            system: { mode: "NORMAL", uptime: "04:32:17", incidents: 0 }
        };

        let currentMode = "FOOTBALL";

        // --- RENDER ENGINE ---
        function initStadiumSVG() {
            const svg = document.getElementById('stadium-svg');
            for(let i=0; i<12; i++) {
                const arc = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
                const rx = 300 + (i * 65);
                const ry = 200 + (i * 45);
                arc.setAttribute("cx", "500");
                arc.setAttribute("cy", "1100");
                arc.setAttribute("rx", rx);
                arc.setAttribute("ry", ry);
                arc.setAttribute("fill", "none");
                arc.setAttribute("stroke", "#ffffff08");
                arc.setAttribute("stroke-width", "1");
                svg.appendChild(arc);
            }
        }

        function updateSensors() {
            SENSOR_DATA.zones.forEach(zone => {
                zone.crowd = Math.max(30, Math.min(99, zone.crowd + (Math.random() > 0.5 ? 1 : -1) * Math.floor(Math.random()*3)));
                zone.o2 = Math.max(17.5, Math.min(21.2, zone.o2 + (Math.random() - 0.5) * 0.2));
                zone.temp += (Math.random() - 0.5) * 0.4;

                if (zone.crowd > 90 || zone.o2 < 19.5) zone.risk = "CRITICAL";
                else if (zone.crowd > 75) zone.risk = "HIGH";
                else if (zone.crowd > 55) zone.risk = "MEDIUM";
                else zone.risk = "LOW";
            });

            let parts = SENSOR_DATA.system.uptime.split(':').map(Number);
            parts[2]++;
            if(parts[2] >= 60) { parts[2]=0; parts[1]++; }
            if(parts[1] >= 60) { parts[1]=0; parts[0]++; }
            SENSOR_DATA.system.uptime = parts.map(p => String(p).padStart(2,'0')).join(':');

            renderAll();
        }

        function renderAll() {
            // Containers
            const heatmap = document.getElementById('heatmap-container');
            const labels = document.getElementById('labels-container');
            const vitals = document.getElementById('vitals-hud');
            const analytics = document.getElementById('zone-list');
            const meshMeta = document.getElementById('mesh-meta');
            const sysStatus = document.getElementById('system-status');

            // Clear dynamic zones
            heatmap.innerHTML = '';
            labels.innerHTML = '';
            vitals.innerHTML = '';
            analytics.innerHTML = '';

            SENSOR_DATA.zones.forEach((zone, index) => {
                // 1. Heatmap Zone
                const hz = document.createElement('div');
                hz.className = 'heatmap-zone';
                const size = Math.max(60, zone.crowd * 1.4);
                hz.style.width = size + 'px';
                hz.style.height = size + 'px';
                hz.style.left = zone.x + '%';
                hz.style.top = zone.y + '%';
                hz.style.animationDelay = (index * 0.6) + 's';
                
                let bgColor = 'rgba(0, 255, 200, 0.10)';
                if(zone.risk === 'CRITICAL') bgColor = 'rgba(255, 40, 0, 0.28)';
                else if(zone.risk === 'HIGH') bgColor = 'rgba(255, 140, 0, 0.22)';
                else if(zone.risk === 'MEDIUM') bgColor = 'rgba(0, 255, 200, 0.18)';
                hz.style.background = bgColor;
                heatmap.appendChild(hz);

                // 2. Floating Label
                const fl = document.createElement('div');
                fl.className = 'zone-float-label';
                fl.style.left = zone.x + '%';
                fl.style.top = zone.y + '%';
                fl.style.animationDelay = (index * 0.8) + 's';
                fl.innerHTML = `${zone.id} | ${zone.crowd}% | O2:${zone.o2.toFixed(1)}`;
                labels.appendChild(fl);

                // 3. Vitals HUD Row
                const vr = document.createElement('div');
                vr.className = 'vitals-row';
                if(zone.risk === 'CRITICAL') vr.style.background = 'rgba(255, 0, 0, 0.08)';
                
                const o2Color = zone.o2 < 19.5 ? "#ff4444" : (zone.o2 < 20.0 ? "#ffaa00" : "#00ffc8");
                const tColor = zone.temp > 35 ? "#ff4444" : (zone.temp > 33 ? "#ffaa00" : "#00ffc8");
                
                vr.innerHTML = `
                    <div class="vitals-left">
                        <span class="vitals-id">${zone.id}</span>
                        <span class="vitals-name">${zone.name}</span>
                    </div>
                    <div class="vitals-right">
                        <span class="vitals-stat">O2:<span style="color:${o2Color}">${zone.o2.toFixed(1)}%</span></span>
                        <span class="vitals-stat">T:<span style="color:${tColor}">${zone.temp.toFixed(1)}°C</span></span>
                    </div>
                `;
                vitals.appendChild(vr);

                // 4. Detailed Analytics Card
                const card = document.createElement('div');
                card.className = `zone-card ${zone.risk}`;
                card.innerHTML = `
                    <div class="zone-header">
                        <span class="zone-name">${zone.name}</span>
                        <span class="risk-badge risk-${zone.risk}">${zone.risk}</span>
                    </div>
                    <div class="stat-grid">
                        <div class="stat-item"><span class="stat-label">CROWD:</span><span class="stat-value">${zone.crowd}%</span></div>
                        <div class="stat-item"><span class="stat-label">O2:</span><span class="stat-value">${zone.o2.toFixed(1)}%</span></div>
                        <div class="stat-item"><span class="stat-label">TEMP:</span><span class="stat-value">${zone.temp.toFixed(1)}°C</span></div>
                        <div class="stat-item"><span class="stat-label">ID:</span><span class="stat-value">${zone.id}</span></div>
                    </div>
                `;
                analytics.appendChild(card);
            });

            // Mesh Section
            meshMeta.innerHTML = `
                <div class="system-row"><span>STATUS:</span><span class="mesh-active">${SENSOR_DATA.mesh.active ? '● ACTIVE' : '○ OFFLINE'}</span></div>
                <div class="system-row"><span>NODES:</span><span class="system-val">${SENSOR_DATA.mesh.nodes.toLocaleString()} nodes</span></div>
                <div class="system-row"><span>COVERAGE:</span><span class="system-val">${SENSOR_DATA.mesh.coverage}% coverage</span></div>
            `;

            // System Status Section
            sysStatus.innerHTML = `
                <div class="system-row"><span>MODE:</span><span class="system-val">${currentMode}</span></div>
                <div class="system-row"><span>UPTIME:</span><span class="system-val">${SENSOR_DATA.system.uptime}</span></div>
                <div class="system-row"><span>INCIDENTS:</span><span class="system-val">${SENSOR_DATA.system.incidents} active</span></div>
            `;

            // Meta load
            document.getElementById('meta-load').textContent = (10 + Math.floor(Math.random()*8)) + "%";
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                if(btn.textContent === mode) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderAll();
        }

        // --- INITIALIZE ---
        initStadiumSVG();
        renderAll();
        setInterval(updateSensors, 3000);
    </script>
</body>
</html>
